<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Login · Any Type Name You Want</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(71, 85, 105, 0.6);
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #0f172a;
            border: 1.5px solid #2d3a5e;
            border-radius: 1.2rem;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus {
            border-color: #38bdf8;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(105deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        .submit-btn:hover {
            transform: scale(0.98);
        }
        .feedback {
            margin-top: 1.5rem;
            padding: 0.8rem;
            border-radius: 1.2rem;
            background: rgba(0,0,0,0.4);
            text-align: center;
            color: #facc15;
            border-left: 3px solid #facc15;
            font-size: 0.85rem;
        }
        .code-hint {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: #6b7280;
            text-align: center;
            border: 1px dashed #334155;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h1>⚡ Triveni Pathsala ⚡</h1>
        <p></p>
    </div>
    <form id="loginForm">
        <div class="input-group">
            <label class="input-label" id="field1Label">📘 FIRST FIELD</label>
            <input type="text" id="field1" class="input-field" placeholder="Enter Name" autocomplete="off">
        </div>
        <div class="input-group">
            <label class="input-label" id="field2Label">🔑 SECOND FIELD</label>
            <input type="password" id="field2" class="input-field" placeholder="Enter Password">
        </div>
        <button type="submit" class="submit-btn">→ Login ←</button>
    </form>
    <div id="feedbackMsg" class="feedback">
        ✨ Rules can use any type name (e.g., "student_id", "pin", "code")
    </div>
    <div class="code-hint">
        🛠️ <strong></strong><br>
        <code></code> <br>
         <code>type</code> <code></code>, <code></code> <code></code> <br>
    
    </div>
</div>

<script>
    // ============================================================
    // 🔧 STEP 1: RENAME YOUR INPUT FIELDS (optional)
    // ============================================================
    const FIELD1_LABEL = "📘 STUDENT ID";   // 👈 Change to any text
    const FIELD2_LABEL = "🔑 ACCESS PIN";   // 👈 Change to any text

    // Apply the labels to the HTML
    document.getElementById('field1Label').innerHTML = FIELD1_LABEL;
    document.getElementById('field2Label').innerHTML = FIELD2_LABEL;

    // ============================================================
    // 🎯 STEP 2: DEFINE YOUR RULES (use ANY type name you want)
    // ============================================================
    // Each rule has:
    //   - type:   any word you like (e.g., "student_id", "pin", "magic")
    //   - value:  the exact text to match (case-insensitive)
    //   - url:    where to redirect
    //   - field:  "first"  → compare against the FIRST input box
    //             "second" → compare against the SECOND input box
    // ============================================================
    const CUSTOM_RULES = [
        
        { type: "2468", value: "Sumit", url: "./detail1.html", field: "first" },
        
        
        { type: "Anand", value: "1234", url: "./student2.html", field: "second" },
        { type: "Sumit", value: "4567", url: "./detail1.html", field: "second" },
        { type: "Alpha", value: "7891", url: "secure.html", field: "second" },
        
        //
    ];

    // ============================================================
    // ⚙️ LOGIC (no need to change)
    // ============================================================
    const form = document.getElementById('loginForm');
    const field1Input = document.getElementById('field1');
    const field2Input = document.getElementById('field2');
    const feedbackDiv = document.getElementById('feedbackMsg');

    function setFeedback(msg, isError = true) {
        feedbackDiv.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
        feedbackDiv.style.color = isError ? '#facc15' : '#86efac';
    }

    function handleRedirect(e) {
        e.preventDefault();
        const val1 = field1Input.value.trim();
        const val2 = field2Input.value.trim();

        if (val1 === "" && val2 === "") {
            setFeedback("❌ Both fields are empty.");
            return;
        }

        const upperVal1 = val1.toUpperCase();
        const upperVal2 = val2.toUpperCase();

        for (let rule of CUSTOM_RULES) {
            if (!rule.value || !rule.url) continue;
            const ruleValueUpper = rule.value.toUpperCase();
            let matched = false;
            let matchedValue = "";

            if (rule.field === "first" && upperVal1 === ruleValueUpper) {
                matched = true;
                matchedValue = val1;
            } else if (rule.field === "second" && upperVal2 === ruleValueUpper) {
                matched = true;
                matchedValue = val2;
            }

            if (matched) {
                setFeedback(`✅ Type "${rule.type}" matched → redirecting to ${rule.url}`, false);
                setTimeout(() => { window.location.href = rule.url; }, 200);
                return;
            }
        }

        setFeedback(`⛔ Access denied. No rule matched. Check your rules in CUSTOM_RULES array.`);
    }

    form.addEventListener('submit', handleRedirect);
</script>
</body>
</html>
