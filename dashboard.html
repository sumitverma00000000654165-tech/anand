<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ID Card & Fees · Triveni Pathsala</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        body {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            min-height: 100vh;
            color: #e2e8f0;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .loading-msg {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
            font-size: 0.95rem;
        }
        /* ID Card */
        .id-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 1.8rem;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }
        .id-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .school-name {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 750;
            background: linear-gradient(145deg, #e2e8f0, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.2rem;
            letter-spacing: 0.04em;
        }
        .id-body {
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .photo-wrapper {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2.5px solid #38bdf8;
            overflow: hidden;
            background: #1e293b;
            box-shadow: 0 0 12px rgba(56,189,248,0.3);
        }
        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .details {
            flex: 1;
            min-width: 200px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0;
            border-bottom: 1px dashed #2d3a5e;
            font-size: 0.82rem;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: #94a3b8;
            font-weight: 500;
        }
        .detail-value {
            color: #f1f5f9;
            font-weight: 600;
            text-align: right;
            word-break: break-word;
        }
        .extra-details {
            margin-top: 1rem;
            width: 100%;
        }

        /* Fees Card */
        .fees-card {
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #334155;
            border-radius: 1.4rem;
            padding: 1.2rem;
            box-shadow: 0 15px 35px -8px rgba(0,0,0,0.5);
        }
        .fees-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #bae6fd;
            margin-bottom: 1.2rem;
            text-align: center;
            letter-spacing: 0.03em;
        }
        .fee-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .fee-month {
            background: #1e293b;
            border-radius: 0.8rem;
            padding: 0.6rem 0.3rem;
            text-align: center;
            font-size: 0.72rem;
            color: #cbd5e1;
            transition: 0.2s;
            border: 1px solid #2d3a5e;
        }
        .month-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .fee-status {
            font-weight: 700;
            font-size: 0.7rem;
        }
        .paid {
            color: #4ade80;
        }
        .unpaid {
            color: #f87171;
        }

        .logout-btn {
            margin-top: 1.5rem;
            width: 100%;
            background: rgba(248,113,113,0.08);
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.03em;
        }
        .logout-btn:hover {
            background: rgba(248,113,113,0.15);
        }
        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loading-msg">🔍 Loading student data...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBeZl52HEWGz-vE72QZ5taznvpYTfq3QUk",
        authDomain: "login-and-reg-5728d.firebaseapp.com",
        databaseURL: "https://login-and-reg-5728d-default-rtdb.firebaseio.com",
        projectId: "login-and-reg-5728d",
        storageBucket: "login-and-reg-5728d.firebasestorage.app",
        messagingSenderId: "435846403197",
        appId: "1:435846403197:web:d6a05a55e40839d15dcd14"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const sessionData = JSON.parse(sessionStorage.getItem('triveni_student'));
    if (!sessionData || !sessionData.studentId) {
        document.getElementById('app').innerHTML = '<div class="loading-msg">❌ No active session. Please <a href="login.html">login</a>.</div>';
    } else {
        loadStudentData(sessionData.studentId);
    }

    async function loadStudentData(studentId) {
        const appDiv = document.getElementById('app');
        try {
            const dbRef = ref(database);
            const snapshot = await get(child(dbRef, `students/${studentId}`));
            if (!snapshot.exists()) {
                appDiv.innerHTML = '<div class="loading-msg">❌ Student record not found.</div>';
                return;
            }
            const data = snapshot.val();
            appDiv.innerHTML = renderDashboard(studentId, data);
        } catch (err) {
            console.error(err);
            appDiv.innerHTML = '<div class="loading-msg">⚠️ Error loading data. Please try again later.</div>';
        }
    }

    function renderDashboard(studentId, data) {
        // Extract details with fallbacks
        const fullName = data.fullName || studentId;
        const studentClass = data.class || 'N/A';
        const father = data.fatherName || 'N/A';
        const phone = data.phone || 'N/A';
        const admission = data.admissionDate || 'N/A';
        const registration = data.registrationDate ? new Date(data.registrationDate).toLocaleDateString() : 'N/A';
        const photoSrc = data.photoBase64 && data.photoBase64.startsWith('data:image') 
                            ? data.photoBase64 
                            : 'https://via.placeholder.com/80x80/1e293b/38bdf8?text=👤';

        // Fee Status (array with 12 booleans)
        const feeArray = data.feeStatus || [];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        let feeHtml = '';
        // Build 3 rows of 4 months
        for (let row = 0; row < 3; row++) {
            feeHtml += '<div class="fee-grid">';
            for (let col = 0; col < 4; col++) {
                const idx = row * 4 + col;
                if (idx < 12) {
                    const paid = feeArray[idx] === true;
                    const statusText = paid ? 'Paid' : 'Unpaid';
                    const statusClass = paid ? 'paid' : 'unpaid';
                    feeHtml += `
                        <div class="fee-month">
                            <div class="month-name">${months[idx]}</div>
                            <div class="fee-status ${statusClass}">${statusText}</div>
                        </div>`;
                }
            }
            feeHtml += '</div>';
        }

        return `
            <div class="id-card">
                <div class="school-name"> Triveni Pathsala</div>
                <div class="id-body">
                    <div class="photo-wrapper">
                        <img src="${photoSrc}" alt="Student Photo" onerror="this.src='https://via.placeholder.com/80x80/1e293b/38bdf8?text=👤'">
                    </div>
                    <div class="details">
                        <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${fullName}</span></div>
                        <div class="detail-row"><span class="detail-label">Student ID</span><span class="detail-value">${studentId}</span></div>
                        <div class="detail-row"><span class="detail-label">Class</span><span class="detail-value">${studentClass}</span></div>
                    </div>
                </div>
                <div class="extra-details">
                    <div class="detail-row"><span class="detail-label">Father's Name</span><span class="detail-value">${father}</span></div>
                    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${phone}</span></div>
                    <div class="detail-row"><span class="detail-label">Admission Date</span><span class="detail-value">${admission}</span></div>
                    <div class="detail-row"><span class="detail-label">Registration</span><span class="detail-value">${registration}</span></div>
                </div>
            </div>

            <div class="fees-card">
                <div class="fees-title">📊 Monthly Fee Status </div>
                ${feeHtml}
            </div>

            <button class="logout-btn" onclick="sessionStorage.clear(); window.location.href='login.html'">🚪 Logout & Return to Login</button>
        `;
    }
</script>
</body>
</html>
